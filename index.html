<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Clickable Checkbox</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      padding: 50px;
      background: #f8f9fa;
    }

    .checkbox-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      color: #333;
      cursor: pointer;
      user-select: none;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.2s ease;
    }

    .checkbox-wrapper:hover {
      background: #f0f0f0;
    }

    input[type="checkbox"] {
      width: 26px;
      height: 26px;
      accent-color: #000;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    input[type="checkbox"]:checked {
      transform: scale(1.1);
    }

    label {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .checkbox-wrapper:active label {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="checkbox-wrapper">
    <input type="checkbox" id="js-interactivity" checked>
    <label for="js-interactivity">
      Webpage with JavaScript-based interactivity
    </label>
  </div>

  <p id="status" style="margin-top: 30px; font-weight: bold; font-size: 17px;">
    ✅ Currently: Checked (Interactive)
  </p>

  <script>
    const checkbox = document.getElementById('js-interactivity');
    const status = document.getElementById('status');
    const wrapper = document.querySelector('.checkbox-wrapper');

    function updateStatus() {
      if (checkbox.checked) {
        status.innerHTML = '✅ Currently: Checked (Interactive)';
        status.style.color = 'green';
      } else {
        status.innerHTML = '❌ Currently: Unchecked (Static)';
        status.style.color = 'red';
      }
    }

    // Make the whole row clickable
    wrapper.addEventListener('click', function(e) {
      // Avoid double trigger if clicking directly on checkbox
      if (e.target.type !== 'checkbox') {
        checkbox.checked = !checkbox.checked;
      }
      updateStatus();
    });

    // Also listen to direct checkbox changes
    checkbox.addEventListener('change', updateStatus);

    // Initial status
    updateStatus();
  </script>

</body>
</html>
